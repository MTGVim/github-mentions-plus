name: Release Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Existing git tag to release, for example v1.1.0'
        required: true
        type: string
      submit_to_chrome_web_store:
        description: 'Upload the built zip to the Chrome Web Store and submit it for review'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      SHOULD_SUBMIT_TO_CWS: ${{ github.event_name == 'workflow_dispatch' && inputs.submit_to_chrome_web_store }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}"
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Tag must look like v1.0.0"
            exit 1
          fi
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"

      - name: Validate manifest version matches tag
        shell: bash
        run: |
          set -euo pipefail
          MANIFEST_VERSION="$(sed -n 's/.*"version":[[:space:]]*"\([^"]*\)".*/\1/p' manifest.json | head -n 1)"
          TAG_VERSION="${TAG_NAME#v}"
          if [[ -z "$MANIFEST_VERSION" ]]; then
            echo "Failed to read manifest version"
            exit 1
          fi
          if [[ "$MANIFEST_VERSION" != "$TAG_VERSION" ]]; then
            echo "manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_NAME)"
            exit 1
          fi

      - name: Build release zip
        shell: bash
        run: bash scripts/build-release-zip.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          generate_release_notes: true
          files: release/*.zip
