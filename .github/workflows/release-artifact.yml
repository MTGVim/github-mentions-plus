name: Build Release Artifact

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'manifest.json'
      - 'package.json'
      - 'package-lock.json'
      - 'background.js'
      - 'content_script.js'
      - 'browserAction/**'
      - 'content/**'
      - 'icons/**'
      - 'src/**'
      - 'utils/**'
      - 'scripts/build.js'
      - 'scripts/build-release-zip.sh'
      - '.github/workflows/release-artifact.yml'
      - '.github/workflows/release.yml'

permissions:
  contents: read

jobs:
  build-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Build zip
        shell: bash
        run: bash scripts/build-release-zip.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-mentions-plus-release-zip
          path: release/*.zip
          if-no-files-found: error
